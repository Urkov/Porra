name: Daily World Cup Scraper & Update

on:
  schedule:
    # 08:00 in Spain during summer time (UTC+2).
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run scraper
        run: node scripts/scrapeV2.js

      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain -- data/matches.json data/scorers.json data/actual_results.json)" ]]; then
            git add data/matches.json data/scorers.json data/actual_results.json
            git commit -m "Update World Cup results and scorers"
            git push
            echo "Data updated and pushed."
          else
            echo "No result or scorer changes."
          fi
